# Localhost + become_user: Ansible 2.20 may set temp-file ACLs; GNU chmod on Linux rejects
# "A+user:…:allow". This mitigates some modules; tempfile uses root + chown instead of become_user.
# Git clone uses root + sudo -u for the same reason.
# https://docs.ansible.com/ansible-core/2.20/playbook_guide/playbooks_privilege_escalation.html
[defaults]
allow_world_readable_tmpfiles = True
