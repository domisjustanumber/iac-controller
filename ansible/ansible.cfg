# Localhost + become_user (e.g. tofu): Ansible may set temp-file ACLs; GNU chmod on Linux
# rejects modes like "A+user:tofu:rx:allow". World-readable tmp files during a task only.
# The git module still hit this on 2.20 despite this flag; deployment clone tasks use root + sudo -u.
# https://docs.ansible.com/ansible-core/2.20/playbook_guide/playbooks_privilege_escalation.html
[defaults]
allow_world_readable_tmpfiles = True
