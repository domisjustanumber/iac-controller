---
# Overridden by the PVE provisioning script via -e @extra-vars.yml (exact 1Password vault names).
# IaC Controller — bootstrap-only items (GitHub App, Connect token items read when swapping tokens).
iac_iac_controller_vault: "IaC Controller"
# Ansible — controller SSH keypair; item for Ansible-scoped Connect token (future playbook runs).
iac_ansible_vault: "Ansible"
# OpenTofu — PVE API key, state blob, OpenTofu Connect token, controller Ansible public key for new guests.
iac_opentofu_vault: "OpenTofu"
# Item titles (exact match for Connect item_info / generic_item)
iac_op_item_opentofu_pve_key: "OpenTofu PVE API Key"
iac_op_item_github_app: "GitHub App"
iac_op_field_github_app_pem: "Private_Key"
iac_op_item_opentofu_state: "OpenTofu state file"
# Separate Secure Note (OpenTofu vault): concealed **state_json** holds **iac-controller-guest-firewall.tfstate** for OpenTofu import.
iac_op_item_opentofu_controller_firewall_state: "OpenTofu controller guest firewall"
# Controller deployment keypair in Ansible vault: **SSH_KEY** item (Connect POST); field **private key** (type CONCEALED).
# Legacy **Password** items may store the PEM in concealed **password**; bootstrap still reads that.
iac_op_item_ansible_ssh: "Ansible SSH Key"
# Legacy Password-item concealed field (PEM).
iac_op_field_ansible_ssh_private: "password"
# SSH_KEY private field label (1Password standard; Connect POST uses type CONCEALED).
iac_op_field_ansible_ssh_private_key: "private key"
iac_op_field_ansible_ssh_public: "public key"
# Plain ssh-ed25519 (etc.) public key line for cloud-init / authorized_keys — not an OpenSSH user certificate.
iac_op_item_opentofu_ansible_ssh: "Ansible SSH Public Key"
# Legacy Secure Note item used custom field **public_key**; SSH_KEY items use iac_op_field_ansible_ssh_* labels.
iac_op_field_opentofu_ansible_ssh_public_legacy: "public_key"
iac_op_field_credential: "credential"
# Value field for OP items that store OpenTofu state JSON.
iac_op_field_state_body: "state_json"
# Connect access tokens (Password items; concealed iac_op_field_credential). Ansible & OpenTofu items are stored
# in iac_iac_controller_vault; bootstrap reads them and installs narrower tokens on disk for each user.
iac_op_item_connect_token_opentofu: "1Password Connect Access Token: OpenTofu"
iac_op_item_connect_token_bootstrap: "1Password Connect Access Token: Bootstrap"
iac_op_item_connect_token_ansible: "1Password Connect Access Token: Ansible"
# Secure Note in IaC Controller vault: SSH public key line for the cursor user (authorized_keys).
# Field may be 1Password **text** or **concealed / password**; label must match iac_op_field_cursor_ssh_public.
iac_op_item_cursor_ssh: "Cursor SSH Public Key"
iac_op_field_cursor_ssh_public: "public_key"

iac_cursor_user: cursor

# Publish port (host): must match **IAC_CONNECT_API_PORT** in **scripts/pve/create-iac-controller-lxc.sh** firewall rule.
iac_connect_api_port: 8080
iac_connect_credentials_path: /opt/iac-connect/credentials.json
iac_connect_token_path_tofu: /home/tofu/.config/op/connect_token
# Playbook loads this path (ansible user runs iac_controller.yml)
iac_connect_token_path: /home/ansible/.config/op/connect_token
# Shared group for /home/tofu/deployment so tofu + ansible can read/write the checkout
iac_deployment_group: iac-deploy
iac_tofu_user: tofu
iac_tofu_home: /home/tofu
iac_deployment_path: "{{ iac_tofu_home }}/deployment"
# Local state file basenames (canonical copies live in 1Password; bootstrap uses ephemeral paths only).
iac_opentofu_state_file: terraform.tfstate
# Guest firewall OpenTofu state basename; synced to **iac_op_item_opentofu_controller_firewall_state**.
iac_opentofu_controller_firewall_state_file: iac-controller-guest-firewall.tfstate
# Written on the guest when deployment workspace **tofu plan** reports pending changes; PVE script prints this last then deletes it.
iac_bootstrap_lib_dir: /var/lib/iac-controller
iac_bootstrap_outstanding_opentofu_notice: "{{ iac_bootstrap_lib_dir }}/bootstrap-outstanding-opentofu"
# Proxmox API URL from inside the CT (e.g. https://192.168.1.10:8006/) — set by **create-iac-controller-lxc.sh** extra-vars.
iac_pve_api_endpoint: ""
iac_pve_node_name: ""
# LXC VMID on Proxmox; set by create script. When 0, OpenTofu firewall import is skipped.
iac_controller_lxc_vmid: 0
# Skip TLS verify for typical PVE self-signed cert (PROXMOX_VE_INSECURE).
iac_pve_api_tls_insecure: true
iac_sync_controller_firewall_opentofu: true
# Re-runs: `ansible-playbook ... -e iac_controller_versions_only=true` — apt/Docker images/OpenTofu/collections only; no 1Password or SSH bootstrap.
iac_controller_versions_only: false
# PVE LXCs often have no IPv6 route; Docker registries return AAAA and pulls fail with "network is unreachable". Set false for dual-stack hosts.
iac_disable_ipv6: true
