---
# IaC controller provisioning (run on the LXC as root with become, local connection).
# This playbook uses the bootstrap Connect token from iac_connect_token_path for all Connect calls.
# That token must access three vaults: iac_iac_controller_vault (GitHub App, Ansible & OpenTofu Connect token
# items read at bootstrap), iac_ansible_vault (Ansible SSH Key item), iac_opentofu_vault (PVE key, state, public key).
# On success, narrower tokens from IaC Controller items are written for tofu and ansible users.
- name: IaC controller setup
  hosts: localhost
  gather_facts: true
  become: true
  # Ubuntu /bin/sh is dash: no pipefail, no [[ ]]. All shell: tasks use bash features.
  module_defaults:
    ansible.builtin.shell:
      executable: /bin/bash
    # Pinned onepassword.connect 2.3.0 field_info accepts **vault UUID only** (vault name fails closed).
    # Token must stay the slurped bootstrap JWT for every read during this play.
    onepassword.connect.field_info:
      hostname: "{{ connect_host }}"
      token: "{{ iac_connect_bootstrap_token }}"

  vars:
    iac_repo_root: "{{ playbook_dir | dirname | dirname }}"
    iac_tofu_pve_token_file: "{{ iac_tofu_home }}/.config/iac-controller/pve_api_token"
    iac_connect_compose_dir: /opt/iac-connect
    iac_github_token_script: "{{ (playbook_dir | dirname) }}/scripts/github_installation_token.py"
    iac_opentofu_fw_dir: "{{ iac_deployment_path }}/iac-controller-guest-firewall"
    # iac_opentofu_root_state_path / iac_opentofu_fw_state_path: ephemeral (set_fact); never persist under iac_deployment_path.

  pre_tasks:
    - name: Load bootstrap 1Password Connect API token from disk
      ansible.builtin.slurp:
        src: "{{ iac_connect_token_path }}"
      register: _slurp_connect
      no_log: true

    - name: Set Connect API facts (bootstrap token for every onepassword.connect call in this play)
      ansible.builtin.set_fact:
        iac_connect_bootstrap_token: "{{ _slurp_connect.content | b64decode | trim }}"
        connect_host: "http://127.0.0.1:{{ iac_connect_api_port }}"
      no_log: true

  tasks:
    - block:
      - name: Install prerequisites (latest from configured apt sources)
        ansible.builtin.apt:
          name:
            - ca-certificates
            - curl
            - gnupg
            - openssh-client
            - openssh-server
            - python3
            - python3-apt
          state: latest
          update_cache: true

      - name: Docker apt keyring dir
        ansible.builtin.file:
          path: /etc/apt/keyrings
          state: directory
          mode: "0755"

      - name: Add Docker upstream signing key
        ansible.builtin.shell: |
          set -euo pipefail
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
        args:
          creates: /etc/apt/keyrings/docker.gpg

      - name: Docker apt repository
        ansible.builtin.apt_repository:
          repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"

      - name: Install Docker Engine
        ansible.builtin.apt:
          name:
            - docker-ce
            - docker-ce-cli
            - containerd.io
            - docker-compose-plugin
          state: latest
          update_cache: true

      - name: Ensure Connect directory exists (credentials + compose)
        ansible.builtin.file:
          path: "{{ iac_connect_compose_dir }}"
          state: directory
          owner: root
          group: root
          mode: "0750"

      # Connect containers use in-image opuser; bind-mounted credentials must be world-readable.
      - name: Connect credentials readable to container opuser (PVE firewall blocks net0 to API port)
        ansible.builtin.file:
          path: "{{ iac_connect_credentials_path }}"
          mode: "0644"

      - name: Render Connect compose file
        ansible.builtin.template:
          src: ../templates/docker-compose-connect.yml.j2
          dest: "{{ iac_connect_compose_dir }}/compose.yaml"
          owner: root
          group: root
          mode: "0640"

      # Root owns docker.sock; avoid login-session group refresh issues for compose.
      - name: Bring up 1Password Connect (published on all interfaces; PVE CT firewall isolates net0)
        community.docker.docker_compose_v2:
          project_src: "{{ iac_connect_compose_dir }}"

      - name: Wait for Connect health
        ansible.builtin.uri:
          url: "{{ connect_host }}/health"
          status_code: [200]
          timeout: 10
        register: _health
        until: _health.status == 200
        retries: 45
        delay: 3

      # generic_item requires vault_id (UUID). field_info also needs vault **UUID** on onepassword.connect 2.3.0 (vault name fails).
      # Connect may return 5xx on /v1/vaults briefly after /health is OK while sync is still warming up.
      - name: List Connect vaults to resolve UUID for vault name
        ansible.builtin.uri:
          url: "{{ connect_host }}/v1/vaults"
          method: GET
          headers:
            Authorization: "Bearer {{ iac_connect_bootstrap_token }}"
            Accept: application/json
          status_code: [200, 500, 502, 503, 504]
        register: _iac_connect_vaults
        until: (_iac_connect_vaults.status | default(0)) == 200
        retries: 40
        delay: 3
        no_log: true

      - name: Set Connect vault UUIDs for generic_item (three vaults)
        ansible.builtin.set_fact:
          iac_connect_iac_controller_vault_id: >-
            {%- set _v = _iac_connect_vaults.json | default([]) -%}
            {%- set _want = iac_iac_controller_vault | trim -%}
            {%- set _m = (_v | selectattr('name', 'defined') | selectattr('name', 'equalto', _want) | list) -%}
            {{- ((_m[0].id if (_m | length) > 0 else '') | trim) -}}
          iac_connect_ansible_vault_id: >-
            {%- set _v = _iac_connect_vaults.json | default([]) -%}
            {%- set _want = iac_ansible_vault | trim -%}
            {%- set _m = (_v | selectattr('name', 'defined') | selectattr('name', 'equalto', _want) | list) -%}
            {{- ((_m[0].id if (_m | length) > 0 else '') | trim) -}}
          iac_connect_opentofu_vault_id: >-
            {%- set _v = _iac_connect_vaults.json | default([]) -%}
            {%- set _want = iac_opentofu_vault | trim -%}
            {%- set _m = (_v | selectattr('name', 'defined') | selectattr('name', 'equalto', _want) | list) -%}
            {{- ((_m[0].id if (_m | length) > 0 else '') | trim) -}}

      - name: Require IaC Controller vault visible to Connect (UUID resolved)
        ansible.builtin.assert:
          that:
            - (iac_connect_iac_controller_vault_id | trim | length) > 0
          fail_msg: >-
            No vault named "{{ iac_iac_controller_vault }}" returned by Connect /v1/vaults for this token.

      - name: Require Ansible vault visible to Connect (UUID resolved)
        ansible.builtin.assert:
          that:
            - (iac_connect_ansible_vault_id | trim | length) > 0
          fail_msg: >-
            No vault named "{{ iac_ansible_vault }}" returned by Connect /v1/vaults for this token.

      - name: Require OpenTofu vault visible to Connect (UUID resolved)
        ansible.builtin.assert:
          that:
            - (iac_connect_opentofu_vault_id | trim | length) > 0
          fail_msg: >-
            No vault named "{{ iac_opentofu_vault }}" returned by Connect /v1/vaults for this token.
            Create the vault or set iac_opentofu_vault; grant this Connect token access.

      - name: Read Cursor SSH public key from 1Password (IaC Controller Secure Note)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_iac_controller_vault_id | trim }}"
          item: "{{ iac_op_item_cursor_ssh }}"
          field: "{{ iac_op_field_cursor_ssh_public }}"
        register: _iac_cursor_ssh_pub_field
        failed_when: false
        no_log: true

      - name: Set Cursor SSH public key line from vault
        ansible.builtin.set_fact:
          _iac_cursor_ssh_pub_line: >-
            {{
              (_iac_cursor_ssh_pub_field is failed)
              | ternary('', (
                  _iac_cursor_ssh_pub_field.get('field', {}).get('value')
                  | default(_iac_cursor_ssh_pub_field.get('field_value', ''), true)
                  | default('', true)
                  | trim
                ))
            }}

      - name: Require Cursor SSH public key in IaC Controller vault
        ansible.builtin.assert:
          that:
            - (_iac_cursor_ssh_pub_line | length) > 0
          fail_msg: >-
            Add Secure Note "{{ iac_op_item_cursor_ssh }}" in vault "{{ iac_iac_controller_vault }}"
            with a custom field labeled exactly "{{ iac_op_field_cursor_ssh_public }}" (**text** or **password /
            concealed** — Connect returns the value either way). Do not put the key only in the default Notes body.
            Paste one line: the full SSH **public key** from your `.pub` (ssh-ed25519 / ssh-rsa /
            ecdsa-sha2-nistp* for Cursor or VS Code Remote SSH).
            In 1Password, ensure the bootstrap Connect access token can read this vault item
            (Connect server integration + token vault scope).
            Reads use the **bootstrap** token (module_defaults) and vault UUID **{{ iac_connect_iac_controller_vault_id | trim }}**
            (same access as the /v1/vaults task). If the item already exists, fix the field label or token vault scope;
            on failure the previous task registers Connect/API details in _iac_cursor_ssh_pub_field (re-run with -vv or
            temporarily set no_log: false on that task to see the error).

      - name: Require vault value to look like an SSH public key line
        ansible.builtin.assert:
          that:
            - _iac_cursor_ssh_pub_line is match('^(ssh-rsa|ssh-dss|ssh-ed25519|ecdsa-sha2-nistp(256|384|521)|sk-ssh-ed25519@openssh\.com|sk-ecdsa-sha2-nistp256@openssh\.com)\s')
          fail_msg: >-
            "{{ iac_op_item_cursor_ssh }}" / "{{ iac_op_field_cursor_ssh_public }}" must be one line in
            authorized_keys format (algorithm, base64 key, optional comment). If you have an OpenSSH *user certificate*
            (`…-cert-v01@openssh.com`), use the matching plain **public key** `.pub` line here instead.

      - name: Ensure cursor user for SSH admin access
        ansible.builtin.user:
          name: "{{ iac_cursor_user }}"
          state: present
          create_home: true
          shell: /bin/bash
          password_lock: true

      - name: Passwordless sudo for cursor user
        ansible.builtin.copy:
          dest: /etc/sudoers.d/50-cursor
          mode: "0440"
          content: "{{ iac_cursor_user }} ALL=(ALL) NOPASSWD:ALL\n"
          validate: "visudo -cf %s"

      - name: Cursor user .ssh directory
        ansible.builtin.file:
          path: "/home/{{ iac_cursor_user }}/.ssh"
          state: directory
          owner: "{{ iac_cursor_user }}"
          group: "{{ iac_cursor_user }}"
          mode: "0700"

      - name: Install Cursor authorized_keys (public key line from 1Password)
        ansible.builtin.copy:
          dest: "/home/{{ iac_cursor_user }}/.ssh/authorized_keys"
          content: "{{ _iac_cursor_ssh_pub_line }}\n"
          owner: "{{ iac_cursor_user }}"
          group: "{{ iac_cursor_user }}"
          mode: "0600"
        no_log: true

      - name: Harden sshd for cursor-only public key login
        ansible.builtin.copy:
          dest: /etc/ssh/sshd_config.d/99-iac-controller.conf
          mode: "0644"
          content: |
            # Managed by iac_controller — cursor authorized_keys from 1Password; see README
            PermitRootLogin no
            PasswordAuthentication no
            KbdInteractiveAuthentication no
            PubkeyAuthentication yes
            AuthenticationMethods publickey
            AllowUsers {{ iac_cursor_user }}

      # **sshd -t** expects **/run/sshd** (tmpfiles normally create it on first service start; LXC bootstrap may validate before that).
      - name: Ensure sshd privilege separation runtime directory exists
        ansible.builtin.file:
          path: /run/sshd
          state: directory
          owner: root
          group: root
          mode: "0755"

      - name: Validate sshd configuration
        ansible.builtin.command: sshd -t
        changed_when: false

      - name: Unmask SSH units if held during bootstrap
        ansible.builtin.systemd:
          name: "{{ item }}"
          masked: false
        loop:
          - ssh.socket
          - ssh
        failed_when: false

      - name: Enable and restart SSH service
        ansible.builtin.systemd:
          name: ssh
          enabled: true
          state: restarted

      - name: Read Ansible SSH Key private key from 1Password (Password item)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_ansible_vault_id | trim }}"
          item: "{{ iac_op_item_ansible_ssh }}"
          field: "{{ iac_op_field_ansible_ssh_private }}"
        register: _iac_field_ansible_ssh_priv
        failed_when: false
        no_log: true

      - name: Coalesce Ansible SSH Key private key value from 1Password
        ansible.builtin.set_fact:
          _iac_op_ssh_priv_from_vault: >-
            {{
              (_iac_field_ansible_ssh_priv is failed)
              | ternary('', _iac_field_ansible_ssh_priv.field_value | default('') | trim)
            }}

      - name: Determine if Ansible SSH Key is missing from vault
        ansible.builtin.set_fact:
          _iac_ansible_ssh_missing: "{{ (_iac_op_ssh_priv_from_vault | trim | length) == 0 }}"

      - name: Ensure bootstrap cache directory for ephemeral SSH key material
        ansible.builtin.file:
          path: /root/.cache/iac-bootstrap
          state: directory
          mode: "0700"

      - name: Generate Ansible deployment SSH keypair when not in 1Password
        ansible.builtin.command:
          argv:
            - ssh-keygen
            - -t
            - ed25519
            - -N
            - ""
            - -f
            - /root/.cache/iac-bootstrap/ansible_ed25519
            - -q
            - -C
            - ansible@iac-controller
        when:
          - _iac_ansible_ssh_missing | bool
          - not ansible_check_mode

      - name: Slurp generated Ansible SSH Key private key
        ansible.builtin.slurp:
          src: /root/.cache/iac-bootstrap/ansible_ed25519
        register: _iac_slurp_ansible_ssh_priv
        when:
          - _iac_ansible_ssh_missing | bool
          - not ansible_check_mode
        no_log: true

      - name: Slurp generated Ansible SSH Key public key
        ansible.builtin.slurp:
          src: /root/.cache/iac-bootstrap/ansible_ed25519.pub
        register: _iac_slurp_ansible_ssh_pub
        when:
          - _iac_ansible_ssh_missing | bool
          - not ansible_check_mode
        no_log: true

      # Connect does not support creating SSH_KEY items (returns 403). Password category requires a concealed field
      # named "password" (standard item schema); store the PEM there. Public key stays a separate string field.
      - name: Push new Ansible SSH keypair to 1Password
        onepassword.connect.generic_item:
          hostname: "{{ connect_host }}"
          token: "{{ iac_connect_bootstrap_token }}"
          vault_id: "{{ iac_connect_ansible_vault_id | trim }}"
          title: "{{ iac_op_item_ansible_ssh }}"
          category: password
          state: present
          fields:
            - label: "{{ iac_op_field_ansible_ssh_private }}"
              type: concealed
              value: "{{ _iac_slurp_ansible_ssh_priv.content | b64decode | trim }}"
            - label: "{{ iac_op_field_ansible_ssh_public }}"
              type: string
              value: "{{ _iac_slurp_ansible_ssh_pub.content | b64decode | trim }}"
        when:
          - _iac_ansible_ssh_missing | bool
          - not ansible_check_mode
        no_log: true

      - name: Remove generated Ansible SSH key material from disk
        ansible.builtin.file:
          path: "{{ item }}"
          state: absent
        loop:
          - /root/.cache/iac-bootstrap/ansible_ed25519
          - /root/.cache/iac-bootstrap/ansible_ed25519.pub
        when:
          - _iac_ansible_ssh_missing | bool
          - not ansible_check_mode

      - name: Set effective Ansible SSH Key private key from vault
        ansible.builtin.set_fact:
          _iac_ansible_ssh_priv_eff: "{{ _iac_op_ssh_priv_from_vault }}"
        when: not (_iac_ansible_ssh_missing | bool)

      - name: Set effective Ansible SSH Key private key from generator
        ansible.builtin.set_fact:
          _iac_ansible_ssh_priv_eff: "{{ _iac_slurp_ansible_ssh_priv.content | b64decode | trim }}"
        when:
          - _iac_ansible_ssh_missing | bool
          - not ansible_check_mode

      - name: Set effective Ansible SSH Key public key from generator
        ansible.builtin.set_fact:
          _iac_ansible_ssh_pub_eff: "{{ _iac_slurp_ansible_ssh_pub.content | b64decode | trim }}"
        when:
          - _iac_ansible_ssh_missing | bool
          - not ansible_check_mode

      - name: Read Ansible SSH Key public key from 1Password
        onepassword.connect.field_info:
          vault: "{{ iac_connect_ansible_vault_id | trim }}"
          item: "{{ iac_op_item_ansible_ssh }}"
          field: "{{ iac_op_field_ansible_ssh_public }}"
        register: _iac_field_ansible_ssh_pub
        when: not (_iac_ansible_ssh_missing | bool)
        failed_when: false
        no_log: true

      - name: Coalesce Ansible SSH Key public key value from 1Password
        ansible.builtin.set_fact:
          _iac_op_ssh_pub_from_vault: >-
            {{
              (_iac_field_ansible_ssh_pub is failed)
              | ternary('', _iac_field_ansible_ssh_pub.field_value | default('') | trim)
            }}
        when: not (_iac_ansible_ssh_missing | bool)

      - name: Set effective Ansible SSH Key public key from vault
        ansible.builtin.set_fact:
          _iac_ansible_ssh_pub_eff: "{{ _iac_op_ssh_pub_from_vault }}"
        when:
          - not (_iac_ansible_ssh_missing | bool)
          - (_iac_op_ssh_pub_from_vault | default('') | trim | length) > 0

      - name: Stage Ansible SSH Key private key to derive public key
        ansible.builtin.copy:
          dest: /root/.cache/iac-bootstrap/ansible_ssh_priv_tmp
          content: "{{ _iac_ansible_ssh_priv_eff }}\n"
          mode: "0600"
        when:
          - _iac_ansible_ssh_pub_eff is not defined
          - (_iac_ansible_ssh_priv_eff | default('') | length) > 0
          - not ansible_check_mode
        no_log: true

      - name: Derive SSH public key from private key
        ansible.builtin.command:
          argv: [ssh-keygen, -y, -f, /root/.cache/iac-bootstrap/ansible_ssh_priv_tmp]
        register: _iac_ssh_pub_derived
        changed_when: false
        when:
          - _iac_ansible_ssh_pub_eff is not defined
          - (_iac_ansible_ssh_priv_eff | default('') | length) > 0
          - not ansible_check_mode

      - name: Set effective Ansible SSH Key public key from ssh-keygen
        ansible.builtin.set_fact:
          _iac_ansible_ssh_pub_eff: "{{ _iac_ssh_pub_derived.stdout | trim }}"
        when:
          - _iac_ssh_pub_derived is not skipped
          - _iac_ssh_pub_derived.rc | default(1) == 0

      - name: Remove staged private key after derive
        ansible.builtin.file:
          path: /root/.cache/iac-bootstrap/ansible_ssh_priv_tmp
          state: absent

      - name: Require Ansible SSH Key public key when private key is present
        ansible.builtin.assert:
          that:
            - (_iac_ansible_ssh_pub_eff | default('') | length) > 0
          fail_msg: >-
            Ansible SSH private key is available but public key is missing. Check item "{{ iac_op_item_ansible_ssh }}"
            in 1Password and ensure it has a "{{ iac_op_field_ansible_ssh_public }}" field.
        when:
          - (_iac_ansible_ssh_priv_eff | default('') | length) > 0
          - not ansible_check_mode

      - name: Ensure ansible user .ssh directory
        ansible.builtin.file:
          path: /home/ansible/.ssh
          state: directory
          owner: ansible
          group: ansible
          mode: "0700"

      - name: Install Ansible SSH Key private key for future deployments
        ansible.builtin.copy:
          dest: /home/ansible/.ssh/id_ed25519
          content: "{{ _iac_ansible_ssh_priv_eff }}\n"
          owner: ansible
          group: ansible
          mode: "0600"
        when: (_iac_ansible_ssh_priv_eff | default('') | length) > 0
        no_log: true

      - name: Install Ansible SSH Key public key for future deployments
        ansible.builtin.copy:
          dest: /home/ansible/.ssh/id_ed25519.pub
          content: "{{ _iac_ansible_ssh_pub_eff }}\n"
          owner: ansible
          group: ansible
          mode: "0644"
        when: (_iac_ansible_ssh_pub_eff | default('') | length) > 0

      - name: Read OpenTofu Ansible SSH public key field from 1Password
        onepassword.connect.field_info:
          vault: "{{ iac_connect_opentofu_vault_id | trim }}"
          item: "{{ iac_op_item_opentofu_ansible_ssh }}"
          field: "{{ iac_op_field_opentofu_ansible_ssh_public }}"
        register: _iac_op_tf_ansible_ssh_pub
        failed_when: false
        no_log: true

      - name: Sync OpenTofu Ansible SSH public key to 1Password when missing or mismatched
        onepassword.connect.generic_item:
          hostname: "{{ connect_host }}"
          token: "{{ iac_connect_bootstrap_token }}"
          vault_id: "{{ iac_connect_opentofu_vault_id | trim }}"
          title: "{{ iac_op_item_opentofu_ansible_ssh }}"
          category: secure_note
          state: present
          fields:
            - label: "{{ iac_op_field_opentofu_ansible_ssh_public }}"
              type: string
              value: "{{ _iac_ansible_ssh_pub_eff | trim }}"
        when:
          - not ansible_check_mode
          - (_iac_ansible_ssh_pub_eff | default('') | trim | length) > 0
          - >
              ((_iac_op_tf_ansible_ssh_pub is failed)
              or ((_iac_op_tf_ansible_ssh_pub.field_value | default('') | trim)
              != (_iac_ansible_ssh_pub_eff | trim)))
        no_log: true

      - name: Stat OpenTofu PVE token file (host bootstrap)
        ansible.builtin.stat:
          path: "{{ iac_tofu_pve_token_file }}"
        register: pve_tf_tok

      - name: Read PVE token file
        ansible.builtin.slurp:
          path: "{{ iac_tofu_pve_token_file }}"
        register: _slurp_pve
        when: pve_tf_tok.stat.exists
        no_log: true

      - name: Push PVE API token to 1Password Connect
        onepassword.connect.generic_item:
          hostname: "{{ connect_host }}"
          token: "{{ iac_connect_bootstrap_token }}"
          vault_id: "{{ iac_connect_opentofu_vault_id | trim }}"
          title: "{{ iac_op_item_opentofu_pve_key }}"
          category: secure_note
          state: present
          fields:
            - label: "{{ iac_op_field_credential }}"
              type: concealed
              value: "{{ _slurp_pve.content | b64decode | trim }}"
        register: _iac_push_pve_api
        no_log: true
        when: pve_tf_tok.stat.exists

      - name: Remove local OpenTofu PVE token file after successful 1Password sync
        ansible.builtin.file:
          path: "{{ iac_tofu_pve_token_file }}"
          state: absent
        when:
          - pve_tf_tok.stat.exists
          - _iac_push_pve_api is defined
          - _iac_push_pve_api is not failed
          - not (_iac_push_pve_api.skipped | default(false))

      - name: Remove HashiCorp Terraform apt source (OpenTofu replaces it)
        ansible.builtin.file:
          path: /etc/apt/sources.list.d/hashicorp.list
          state: absent

      - name: Purge HashiCorp terraform package if installed
        ansible.builtin.apt:
          name: terraform
          state: absent
          purge: true

      - name: Install OpenTofu apt repository
        ansible.builtin.shell: |
          set -euo pipefail
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://get.opentofu.org/opentofu.gpg | tee /etc/apt/keyrings/opentofu.gpg >/dev/null
          curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey | gpg --batch --yes --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg
          chmod a+r /etc/apt/keyrings/opentofu.gpg /etc/apt/keyrings/opentofu-repo.gpg
          printf '%s\n' 'deb [signed-by=/etc/apt/keyrings/opentofu.gpg,/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main' \
            > /etc/apt/sources.list.d/opentofu.list
          chmod a+r /etc/apt/sources.list.d/opentofu.list
        args:
          creates: /etc/apt/sources.list.d/opentofu.list

      - name: Install OpenTofu package
        ansible.builtin.apt:
          name: tofu
          state: latest
          update_cache: true

      - name: Ensure deployment directory
        ansible.builtin.file:
          path: "{{ iac_deployment_path }}"
          state: directory
          owner: "{{ iac_tofu_user }}"
          group: "{{ iac_deployment_group }}"
          mode: "2770"
        when: iac_deployment_repo_url | default('') | length > 0

      - name: Read GitHub App PEM from 1Password
        onepassword.connect.field_info:
          vault: "{{ iac_connect_iac_controller_vault_id | trim }}"
          item: "{{ iac_op_item_github_app }}"
          field: "{{ iac_op_field_github_app_key }}"
        register: _gh_pem_field
        failed_when: false
        no_log: true

      - name: Read GitHub App Client ID from 1Password (optional)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_iac_controller_vault_id | trim }}"
          item: "{{ iac_op_item_github_app }}"
          field: "Client_ID"
        register: _gh_cid_field
        failed_when: false
        no_log: true

      - name: Read GitHub App Installation ID from 1Password (optional)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_iac_controller_vault_id | trim }}"
          item: "{{ iac_op_item_github_app }}"
          field: "Installation_ID"
        register: _gh_iid_field
        failed_when: false
        no_log: true

      - name: Effective GitHub App Client ID
        ansible.builtin.set_fact:
          _gh_client_id_eff: "{{ (iac_github_app_client_id | default('') | trim)
            | ternary(iac_github_app_client_id | trim, _gh_cid_field.field_value | default('') | trim) }}"

      - name: Stage GitHub App PEM for token exchange
        ansible.builtin.copy:
          dest: /tmp/iac-github-app.pem
          content: "{{ _gh_pem_field.field_value }}"
          owner: root
          mode: "0600"
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - _gh_pem_field is not failed
          - _gh_pem_field.field_value | default('') | length > 0
        no_log: true

      - name: Installation token via GitHub App
        ansible.builtin.command:
          argv: "{{ _gh_argv }}"
        vars:
          _iid: "{{ (iac_github_installation_id | default('') | trim)
            | ternary(iac_github_installation_id | trim, _gh_iid_field.field_value | default('') | trim) }}"
          _gh_argv: >-
            {{
              ['python3', iac_github_token_script, '--client-id', _gh_client_id_eff,
               '--pem-path', '/tmp/iac-github-app.pem', '--repo-url', iac_deployment_repo_url]
              + ((_iid | length > 0) | ternary(['--installation-id', _iid], []))
            }}
        register: _gh_tok
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - _gh_pem_field is not failed
          - _gh_pem_field.field_value | default('') | length > 0
          - _gh_client_id_eff | length > 0
        changed_when: false
        failed_when: false
        no_log: true

      - name: Clone deployment repository (GitHub App installation token)
        ansible.builtin.shell: |
          set -euo pipefail
          shopt -s dotglob
          url="{{ iac_deployment_repo_url }}"
          tok="{{ _gh_tok.stdout }}"
          branch="{{ iac_deployment_repo_branch | default('main') }}"
          if [[ "$url" =~ ^https://github.com/ ]]; then
            clone_url="https://x-access-token:${tok}@github.com/${url#https://github.com/}"
          else
            echo "Only https://github.com/ URLs are supported for GitHub App clone" >&2
            exit 1
          fi
          rm -rf /tmp/iac-deployment-tmp
          git clone --depth 1 --branch "$branch" "$clone_url" /tmp/iac-deployment-tmp
          find "{{ iac_deployment_path }}" -mindepth 1 -delete
          shopt -s dotglob
          mv /tmp/iac-deployment-tmp/* "{{ iac_deployment_path }}/"
          rm -rf /tmp/iac-deployment-tmp
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - _gh_tok is not skipped
          - _gh_tok.rc | default(1) == 0
          - _gh_tok.stdout | default('') | length > 0
        become: true
        become_user: "{{ iac_tofu_user }}"
        no_log: true

      - name: Clone deployment repository (public HTTPS)
        ansible.builtin.git:
          repo: "{{ iac_deployment_repo_url }}"
          dest: "{{ iac_deployment_path }}"
          version: "{{ iac_deployment_repo_branch | default('main') }}"
          force: true
        become: true
        become_user: "{{ iac_tofu_user }}"
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - (_gh_tok.skipped | default(false)) or (_gh_tok.rc | default(1) != 0) or (_gh_tok.stdout | default('') | length == 0)

      - name: Remove staged GitHub App PEM
        ansible.builtin.file:
          path: /tmp/iac-github-app.pem
          state: absent

      - name: Remove OpenTofu state files from deployment tree (canonical state is only in 1Password)
        ansible.builtin.shell: |
          set -euo pipefail
          shopt -s nullglob
          rm -f \
            "{{ iac_deployment_path }}/{{ iac_opentofu_state_file }}" \
            "{{ iac_deployment_path }}/{{ iac_opentofu_state_file }}.backup" \
            "{{ iac_deployment_path }}/iac-controller-guest-firewall/{{ iac_opentofu_controller_firewall_state_file }}" \
            "{{ iac_deployment_path }}/iac-controller-guest-firewall/{{ iac_opentofu_controller_firewall_state_file }}.backup"
          for f in "{{ iac_deployment_path }}/"*.tfstate*; do
            rm -f "$f"
          done
        when: iac_deployment_repo_url | default('') | length > 0
        changed_when: false

      - name: Create ephemeral directory for OpenTofu state during bootstrap
        ansible.builtin.tempfile:
          state: directory
          suffix: otstate
        become: true
        become_user: "{{ iac_tofu_user }}"
        register: _iac_opentofu_state_tmpdir
        when: >
          (iac_deployment_repo_url | default('') | length > 0)
          or (
            (iac_sync_controller_firewall_opentofu | default(true) | bool)
            and (iac_controller_lxc_vmid | default(0) | int) > 0
            and (iac_pve_node_name | default('') | trim | length) > 0
            and (iac_pve_api_endpoint | default('') | trim | length) > 0
          )

      - name: Set OpenTofu state file paths (ephemeral; removed at end of play)
        ansible.builtin.set_fact:
          iac_opentofu_root_state_path: "{{ _iac_opentofu_state_tmpdir.path }}/{{ iac_opentofu_state_file }}"
          iac_opentofu_fw_state_path: "{{ _iac_opentofu_state_tmpdir.path }}/{{ iac_opentofu_controller_firewall_state_file }}"
        when: _iac_opentofu_state_tmpdir is defined and (_iac_opentofu_state_tmpdir.path | default('') | length) > 0

      - name: Check for OpenTofu root state in ephemeral path
        ansible.builtin.stat:
          path: "{{ iac_opentofu_root_state_path }}"
        register: _st_tfstate
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - iac_opentofu_root_state_path | default('') | length > 0

      - name: Fetch OpenTofu state body from 1Password (when ephemeral root state missing)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_opentofu_vault_id | trim }}"
          item: "{{ iac_op_item_opentofu_state }}"
          field: "{{ iac_op_field_state_body }}"
        register: _tf_state_field
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - iac_opentofu_root_state_path | default('') | length > 0
          - (_st_tfstate.skipped | default(false)) or (not _st_tfstate.stat.exists)
        failed_when: false
        no_log: true

      - name: Restore OpenTofu root state from 1Password to ephemeral file
        ansible.builtin.copy:
          dest: "{{ iac_opentofu_root_state_path }}"
          owner: "{{ iac_tofu_user }}"
          group: "{{ iac_tofu_user }}"
          mode: "0660"
          content: "{{ _tf_state_field.field_value }}"
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - iac_opentofu_root_state_path | default('') | length > 0
          - _tf_state_field is not failed
          - _tf_state_field.field_value | default('') | length > 0
        no_log: true

      - name: Normalize deployment checkout for shared iac-deploy group access
        ansible.builtin.shell: |
          set -euo pipefail
          chown -R '{{ iac_tofu_user }}:{{ iac_deployment_group }}' '{{ iac_deployment_path }}'
          chmod -R u+rwX,g+rwX,o= '{{ iac_deployment_path }}'
          find '{{ iac_deployment_path }}' -type d -exec chmod g+s {} +
        when: iac_deployment_repo_url | default('') | length > 0

      - name: Discover .tf config files in deployment checkout
        ansible.builtin.find:
          paths: "{{ iac_deployment_path }}"
          patterns: "*.tf"
          file_type: file
        register: _tf_files
        when: iac_deployment_repo_url | default('') | length > 0

      - name: Run tofu init as tofu user
        ansible.builtin.shell: |
          set -euo pipefail
          cd "{{ iac_deployment_path }}"
          tofu init -input=false
        become: true
        become_user: "{{ iac_tofu_user }}"
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - (_tf_files.matched | default(0)) > 0

      - name: Read Proxmox API token for deployment workspace plan (read-only drift check)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_opentofu_vault_id | trim }}"
          item: "{{ iac_op_item_opentofu_pve_key }}"
          field: "{{ iac_op_field_credential }}"
        register: _iac_pve_tok_deploy_plan
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - (_tf_files.matched | default(0)) > 0
          - iac_opentofu_root_state_path | default('') | length > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
        failed_when: false
        no_log: true

      - name: Plan deployment workspace (bootstrap never applies non-controller resources)
        ansible.builtin.command:
          argv:
            - tofu
            - plan
            - -detailed-exitcode
            - -input=false
            - -state={{ iac_opentofu_root_state_path }}
        args:
          chdir: "{{ iac_deployment_path }}"
        environment:
          HOME: "{{ iac_tofu_home }}"
          PROXMOX_VE_ENDPOINT: "{{ iac_pve_api_endpoint | trim }}"
          PROXMOX_VE_API_TOKEN: "{{ _iac_pve_tok_deploy_plan.field_value | trim }}"
          PROXMOX_VE_INSECURE: "{{ iac_pve_api_tls_insecure | default(true) | bool | lower }}"
        become: true
        become_user: "{{ iac_tofu_user }}"
        register: _iac_root_tf_plan
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - (_tf_files.matched | default(0)) > 0
          - iac_opentofu_root_state_path | default('') | length > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - _iac_pve_tok_deploy_plan is defined
          - (_iac_pve_tok_deploy_plan.skipped | default(false)) == false
          - _iac_pve_tok_deploy_plan.field_value | default('') | length > 0
        changed_when: _iac_root_tf_plan.rc == 2
        failed_when: _iac_root_tf_plan.rc == 1
        no_log: true

      - name: Record pending OpenTofu changes in deployment workspace
        ansible.builtin.set_fact:
          iac_opentofu_deployment_pending: true
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - _iac_root_tf_plan is defined
          - (_iac_root_tf_plan.skipped | default(false)) == false
          - (_iac_root_tf_plan.rc | default(-1)) == 2

      - name: Stat OpenTofu root state after init
        ansible.builtin.stat:
          path: "{{ iac_opentofu_root_state_path }}"
        register: _iac_root_tfstate_stat
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - (_tf_files.matched | default(0)) > 0
          - iac_opentofu_root_state_path | default('') | length > 0

      - name: Slurp OpenTofu root state for 1Password
        ansible.builtin.slurp:
          src: "{{ iac_opentofu_root_state_path }}"
        register: _iac_root_tfstate_slurp
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - iac_opentofu_root_state_path | default('') | length > 0
          - (_iac_root_tfstate_stat.stat.exists | default(false))
          - ((_iac_root_tfstate_stat.stat.size | default(0)) | int) > 0
        no_log: true

      - name: Push OpenTofu root state to 1Password (deployment workspace)
        onepassword.connect.generic_item:
          hostname: "{{ connect_host }}"
          token: "{{ iac_connect_bootstrap_token }}"
          vault_id: "{{ iac_connect_opentofu_vault_id | trim }}"
          title: "{{ iac_op_item_opentofu_state }}"
          category: secure_note
          state: present
          fields:
            - label: "{{ iac_op_field_state_body }}"
              type: concealed
              value: "{{ _iac_root_tfstate_slurp.content | b64decode }}"
        when:
          - iac_deployment_repo_url | default('') | length > 0
          - (_iac_root_tfstate_slurp.content | default('') | length) > 0
        no_log: true

      - name: Read OpenTofu Connect access token from vault (bootstrap token only)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_iac_controller_vault_id | trim }}"
          item: "{{ iac_op_item_connect_token_opentofu }}"
          field: "{{ iac_op_field_credential }}"
        register: _op_connect_token_field
        no_log: true

      - name: Require OpenTofu Connect token in vault (readable only with bootstrap token)
        ansible.builtin.assert:
          that:
            - _op_connect_token_field.field_value | default('') | length > 0
          fail_msg: >-
            Item "{{ iac_op_item_connect_token_opentofu }}" in vault "{{ iac_iac_controller_vault }}" field
            "{{ iac_op_field_credential }}" is missing or empty. Use the bootstrap Connect token on disk;
            it must have access to the IaC Controller vault.

      - name: Install OpenTofu Connect token for tofu user
        ansible.builtin.copy:
          dest: "{{ iac_connect_token_path_tofu }}"
          content: "{{ _op_connect_token_field.field_value | trim }}"
          owner: "{{ iac_tofu_user }}"
          group: "{{ iac_tofu_user }}"
          mode: "0600"
        no_log: true

      - name: Ensure deployment directory exists (OpenTofu state + controller firewall)
        ansible.builtin.file:
          path: "{{ iac_deployment_path }}"
          state: directory
          owner: "{{ iac_tofu_user }}"
          group: "{{ iac_deployment_group }}"
          mode: "2770"
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0

      - name: Require ephemeral OpenTofu paths for guest firewall (tmpdir task must have run)
        ansible.builtin.assert:
          that:
            - iac_opentofu_fw_state_path | default('') | length > 0
          fail_msg: >-
            Internal error: ephemeral OpenTofu state path missing. The transient state directory task
            should run when the controller guest firewall block runs; check playbook preconditions.
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0

      - name: Stage OpenTofu module for IaC controller guest firewall
        ansible.builtin.copy:
          src: "{{ iac_repo_root }}/opentofu/iac-controller-guest-firewall/"
          dest: "{{ iac_opentofu_fw_dir }}/"
          owner: "{{ iac_tofu_user }}"
          group: "{{ iac_deployment_group }}"
          mode: preserve
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0

      - name: Render OpenTofu tfvars for controller guest firewall
        ansible.builtin.template:
          src: ../templates/iac-controller-guest-firewall.tfvars.j2
          dest: "{{ iac_opentofu_fw_dir }}/terraform.tfvars"
          owner: "{{ iac_tofu_user }}"
          group: "{{ iac_deployment_group }}"
          mode: "0660"
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0

      - name: Stat controller-firewall OpenTofu state on disk
        ansible.builtin.stat:
          path: "{{ iac_opentofu_fw_state_path }}"
        register: _iac_fw_state_stat
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0

      - name: Fetch controller-firewall OpenTofu state from 1Password (when local missing)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_opentofu_vault_id | trim }}"
          item: "{{ iac_op_item_opentofu_controller_firewall_state }}"
          field: "{{ iac_op_field_state_body }}"
        register: _iac_fw_state_op
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - (_iac_fw_state_stat.skipped | default(false)) or (not _iac_fw_state_stat.stat.exists)
        failed_when: false
        no_log: true

      - name: Restore controller-firewall OpenTofu state from 1Password
        ansible.builtin.copy:
          dest: "{{ iac_opentofu_fw_state_path }}"
          owner: "{{ iac_tofu_user }}"
          group: "{{ iac_deployment_group }}"
          mode: "0660"
          content: "{{ _iac_fw_state_op.field_value }}"
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - _iac_fw_state_op is not failed
          - _iac_fw_state_op.field_value | default('') | length > 0
          - (_iac_fw_state_stat.skipped | default(false)) or (not _iac_fw_state_stat.stat.exists)
        no_log: true

      - name: Stat controller-firewall OpenTofu state after optional 1Password restore
        ansible.builtin.stat:
          path: "{{ iac_opentofu_fw_state_path }}"
        register: _iac_fw_state_live
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0

      - name: Read Proxmox API token for OpenTofu (controller firewall import)
        onepassword.connect.field_info:
          vault: "{{ iac_connect_opentofu_vault_id | trim }}"
          item: "{{ iac_op_item_opentofu_pve_key }}"
          field: "{{ iac_op_field_credential }}"
        register: _iac_pve_tok_fw_import
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
        no_log: true

      - name: OpenTofu init for controller guest firewall
        ansible.builtin.command:
          argv:
            - tofu
            - init
            - -input=false
        args:
          chdir: "{{ iac_opentofu_fw_dir }}"
        environment:
          HOME: "{{ iac_tofu_home }}"
        become: true
        become_user: "{{ iac_tofu_user }}"
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - _iac_pve_tok_fw_import.field_value | default('') | length > 0

      - name: List OpenTofu resources in controller-firewall state (when state file exists)
        ansible.builtin.command:
          argv:
            - tofu
            - state
            - list
            - -state={{ iac_opentofu_fw_state_path }}
        args:
          chdir: "{{ iac_opentofu_fw_dir }}"
        environment:
          HOME: "{{ iac_tofu_home }}"
        become: true
        become_user: "{{ iac_tofu_user }}"
        register: _iac_fw_tf_list
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - _iac_pve_tok_fw_import.field_value | default('') | length > 0
          - (_iac_fw_state_live.skipped | default(false)) == false
          - _iac_fw_state_live.stat.exists | default(false)
        changed_when: false
        failed_when: false

      - name: Import existing Proxmox guest firewall rules into OpenTofu state
        ansible.builtin.command:
          argv:
            - tofu
            - import
            - -input=false
            - -state={{ iac_opentofu_fw_state_path }}
            - proxmox_virtual_environment_firewall_rules.iac_controller_guest
            - "container/{{ iac_pve_node_name | trim }}/{{ iac_controller_lxc_vmid | int }}"
        args:
          chdir: "{{ iac_opentofu_fw_dir }}"
        environment:
          HOME: "{{ iac_tofu_home }}"
          PROXMOX_VE_ENDPOINT: "{{ iac_pve_api_endpoint | trim }}"
          PROXMOX_VE_API_TOKEN: "{{ _iac_pve_tok_fw_import.field_value | trim }}"
          PROXMOX_VE_INSECURE: "{{ iac_pve_api_tls_insecure | default(true) | bool | lower }}"
        become: true
        become_user: "{{ iac_tofu_user }}"
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - _iac_pve_tok_fw_import.field_value | default('') | length > 0
          - (_iac_fw_state_live.skipped | default(false)) == false
          - >
            (not (_iac_fw_state_live.stat.exists | default(false)))
            or (
              'proxmox_virtual_environment_firewall_rules.iac_controller_guest'
              not in (_iac_fw_tf_list.stdout | default(''))
            )
        register: _iac_fw_import
        changed_when: _iac_fw_import.rc == 0
        no_log: true

      # Exit codes with -detailed-exitcode: 0 = empty plan, 1 = error, 2 = changes (see OpenTofu plan docs).
      - name: Plan controller guest firewall (detect drift vs state + config)
        ansible.builtin.command:
          argv:
            - tofu
            - plan
            - -target=proxmox_virtual_environment_firewall_rules.iac_controller_guest
            - -detailed-exitcode
            - -input=false
            - -state={{ iac_opentofu_fw_state_path }}
        args:
          chdir: "{{ iac_opentofu_fw_dir }}"
        environment:
          HOME: "{{ iac_tofu_home }}"
          PROXMOX_VE_ENDPOINT: "{{ iac_pve_api_endpoint | trim }}"
          PROXMOX_VE_API_TOKEN: "{{ _iac_pve_tok_fw_import.field_value | trim }}"
          PROXMOX_VE_INSECURE: "{{ iac_pve_api_tls_insecure | default(true) | bool | lower }}"
        become: true
        become_user: "{{ iac_tofu_user }}"
        register: _iac_fw_plan
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - _iac_pve_tok_fw_import.field_value | default('') | length > 0
        changed_when: _iac_fw_plan.rc == 2
        failed_when: _iac_fw_plan.rc == 1
        no_log: true

      - name: Apply controller guest firewall (Proxmox matches OpenTofu when plan has changes)
        ansible.builtin.command:
          argv:
            - tofu
            - apply
            - -target=proxmox_virtual_environment_firewall_rules.iac_controller_guest
            - -auto-approve
            - -input=false
            - -state={{ iac_opentofu_fw_state_path }}
        args:
          chdir: "{{ iac_opentofu_fw_dir }}"
        environment:
          HOME: "{{ iac_tofu_home }}"
          PROXMOX_VE_ENDPOINT: "{{ iac_pve_api_endpoint | trim }}"
          PROXMOX_VE_API_TOKEN: "{{ _iac_pve_tok_fw_import.field_value | trim }}"
          PROXMOX_VE_INSECURE: "{{ iac_pve_api_tls_insecure | default(true) | bool | lower }}"
        become: true
        become_user: "{{ iac_tofu_user }}"
        register: _iac_fw_apply
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - _iac_pve_tok_fw_import.field_value | default('') | length > 0
          - _iac_fw_plan is defined
          - not (_iac_fw_plan.skipped | default(false))
          - _iac_fw_plan.rc == 2
        changed_when: true
        failed_when: _iac_fw_apply.rc != 0
        no_log: true

      - name: Slurp controller-firewall OpenTofu state for 1Password
        ansible.builtin.slurp:
          src: "{{ iac_opentofu_fw_state_path }}"
        register: _iac_fw_state_slurp
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - _iac_pve_tok_fw_import.field_value | default('') | length > 0
          - _iac_fw_plan is defined
          - not (_iac_fw_plan.skipped | default(false))
          - _iac_fw_plan.rc in [0, 2]
          - >
            (_iac_fw_plan.rc == 0)
            or (
              (_iac_fw_apply is defined)
              and (not (_iac_fw_apply.skipped | default(false)))
              and (_iac_fw_apply.rc | default(1) == 0)
            )
        no_log: true

      - name: Push controller-firewall OpenTofu state to 1Password
        onepassword.connect.generic_item:
          hostname: "{{ connect_host }}"
          token: "{{ iac_connect_bootstrap_token }}"
          vault_id: "{{ iac_connect_opentofu_vault_id | trim }}"
          title: "{{ iac_op_item_opentofu_controller_firewall_state }}"
          category: secure_note
          state: present
          fields:
            - label: "{{ iac_op_field_state_body }}"
              type: concealed
              value: "{{ _iac_fw_state_slurp.content | b64decode }}"
        when:
          - iac_sync_controller_firewall_opentofu | default(true) | bool
          - (iac_controller_lxc_vmid | default(0) | int) > 0
          - (iac_pve_node_name | default('') | trim | length) > 0
          - (iac_pve_api_endpoint | default('') | trim | length) > 0
          - (_iac_fw_state_slurp.content | default('') | length) > 0
        no_log: true

      - name: Configure unattended upgrades (security + regular + Docker)
        ansible.builtin.apt:
          name: unattended-upgrades
          state: latest
          update_cache: true

      - name: Unattended-upgrades origins
        ansible.builtin.copy:
          dest: /etc/apt/apt.conf.d/50unattended-upgrades
          mode: "0644"
          content: |
            Unattended-Upgrade::Allowed-Origins {
                "${distro_id}:${distro_codename}";
                "${distro_id}:${distro_codename}-security";
                "${distro_id}ESMApps:${distro_codename}-apps-security";
                "${distro_id}ESM:${distro_codename}-infra-security";
            };
            Unattended-Upgrade::Origins-Pattern {
                "origin=Docker";
                "site=packages.opentofu.org";
            };
            Unattended-Upgrade::Automatic-Reboot "false";

      - name: Enable unattended-upgrades timers
        ansible.builtin.copy:
          dest: /etc/apt/apt.conf.d/99iac-unattended-periodic
          mode: "0644"
          content: |
            APT::Periodic::Update-Package-Lists "1";
            APT::Periodic::Unattended-Upgrade "1";
      rescue:
        - name: Record failed bootstrap
          ansible.builtin.set_fact:
            iac_bootstrap_failed: true

      always:
        - name: Remove ephemeral OpenTofu state directory (no tfstate left under /tmp after bootstrap)
          ansible.builtin.file:
            path: "{{ _iac_opentofu_state_tmpdir.path }}"
            state: absent
          when: _iac_opentofu_state_tmpdir is defined and (_iac_opentofu_state_tmpdir.path | default('') | length) > 0

        - name: Ensure bootstrap lib directory exists for host notices
          ansible.builtin.file:
            path: "{{ iac_bootstrap_lib_dir }}"
            state: directory
            mode: "0755"
          when: not (iac_bootstrap_failed | default(false))

        - name: Record outstanding deployment OpenTofu changes for provisioning host message
          ansible.builtin.copy:
            dest: "{{ iac_bootstrap_outstanding_opentofu_notice }}"
            mode: "0644"
            content: |
              You have outstanding OpenTofu changes to apply (deployment workspace {{ iac_deployment_path }}).
              Bootstrap only applied the IaC controller guest firewall resource; run tofu plan/apply as user tofu when ready.
          when:
            - not (iac_bootstrap_failed | default(false))
            - iac_opentofu_deployment_pending | default(false) | bool

        - name: Remove outstanding OpenTofu notice when deployment workspace matches state
          ansible.builtin.file:
            path: "{{ iac_bootstrap_outstanding_opentofu_notice }}"
            state: absent
          when:
            - not (iac_bootstrap_failed | default(false))
            - not (iac_opentofu_deployment_pending | default(false) | bool)

        - name: Remove Connect token file after failed bootstrap
          ansible.builtin.file:
            path: "{{ iac_connect_token_path }}"
            state: absent
          when: iac_bootstrap_failed | default(false)

        - name: Read Ansible Connect token from 1Password using bootstrap token (successful bootstrap only)
          onepassword.connect.field_info:
            vault: "{{ iac_connect_iac_controller_vault_id | trim }}"
            item: "{{ iac_op_item_connect_token_ansible }}"
            field: "{{ iac_op_field_credential }}"
          register: _iac_ansible_connect_token_field
          when: not (iac_bootstrap_failed | default(false))
          failed_when: false
          no_log: true

        - name: Replace bootstrap with Ansible Connect token on disk for future playbooks (narrower scope)
          ansible.builtin.copy:
            dest: "{{ iac_connect_token_path }}"
            content: "{{ _iac_ansible_connect_token_field.field_value | trim }}"
            owner: ansible
            group: ansible
            mode: "0600"
          when:
            - not (iac_bootstrap_failed | default(false))
            - (_iac_ansible_connect_token_field.skipped | default(false)) == false
            - _iac_ansible_connect_token_field.field_value | default('') | length > 0
          no_log: true

        - name: Remove bootstrap token when vault lacks Ansible Connect token
          ansible.builtin.file:
            path: "{{ iac_connect_token_path }}"
            state: absent
          when:
            - not (iac_bootstrap_failed | default(false))
            - (_iac_ansible_connect_token_field.skipped | default(false)) == false
            - _iac_ansible_connect_token_field.field_value | default('') | length == 0

        - name: Fail if Ansible Connect token missing in vault after successful bootstrap
          ansible.builtin.fail:
            msg: >-
              Item "{{ iac_op_item_connect_token_ansible }}" in vault "{{ iac_iac_controller_vault }}" field
              "{{ iac_op_field_credential }}" must contain the Connect access token for future Ansible runs.
          when:
            - not (iac_bootstrap_failed | default(false))
            - (_iac_ansible_connect_token_field.skipped | default(false)) == false
            - _iac_ansible_connect_token_field.field_value | default('') | length == 0

        - name: Fail after rescued bootstrap error (ansible-playbook must exit non-zero)
          ansible.builtin.fail:
            msg: >-
              Bootstrap failed earlier in this play (see task output above). Cleanup ran in the rescue/always block;
              fix the error and re-run. Local 1password-credentials.json on the PVE host is only removed when this play exits successfully.
          when: iac_bootstrap_failed | default(false)


